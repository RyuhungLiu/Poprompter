[server]
port = 8000
host = 0.0.0.0
auto_open_browser = true

[cdn]
; CDN 来源 (用于首次启动时下载前端库到本地)
;   1 = unpkg / cdn.tailwindcss.com (推荐，完整 Tailwind JIT 支持)
;   2 = BootCDN (cdn.bootcdn.net) (国内加速，预编译 CSS，不支持任意值)
;   3 = 字节跳动 Staticfile (cdn.staticfile.net) (国内加速，预编译 CSS)
source = 1

; 设为 true 则每次启动都重新下载前端库
force_download = false
