<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Poprompter 遥控器</title>
    <link rel="stylesheet" href="/static/css/pure.css">
</head>
<body>
    <div id="themeToggle">🌓 科技黑</div>
    <div id="status">请求中...</div>
    <div class="container">
        <button id="btnPlay" class="btn-play">▶ 开始</button>
        <div class="grid">
            <button id="btnUp" class="btn-action">↑ 向上微调</button>
            <button id="btnFastForward" class="btn-action">⇟ 快速前进</button>
        </div>
        <button id="btnReset" class="btn-reset">↺ 回到开头</button>
    </div>
    <script src="/static/js/pure.js"></script>
</body>
</html>
